<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Space Mono', monospace;
    overflow: hidden;
  }

  .scene {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
  }

  /* ── Progress bar ── */
  .bar-wrap {
    width: 340px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .bar-track {
    width: 100%;
    height: 54px;
    border: 2.5px solid #1a1a1a;
    border-radius: 14px;
    background: #fff;
    display: flex;
    align-items: center;
    padding: 6px;
    position: relative;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: #2d9e4f;
    border-radius: 9px;
    width: 0%;
    transition: width 0.05s linear;
    position: relative;
    overflow: hidden;
  }

  /* Shine sweep on the bar */
  .bar-fill::after {
    content: '';
    position: absolute;
    top: 0; left: -60%;
    width: 50%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    animation: shine 1.4s ease-in-out infinite;
  }

  @keyframes shine {
    0%   { left: -60%; }
    100% { left: 120%; }
  }

  .bar-label {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #1a1a1a;
    white-space: nowrap;
    z-index: 2;
  }

  .percent-text {
    font-size: 13px;
    color: #888;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* Done state */
  .bar-fill.done { background: #2d9e4f; }

  .done-msg {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #2d9e4f;
    opacity: 0;
    transition: opacity 0.6s ease;
    text-transform: uppercase;
  }
  .done-msg.show { opacity: 1; }

  /* Confetti dots on finish */
  .confetti-wrap {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  .dot {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    opacity: 0;
  }

  @keyframes popDot {
    0%   { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-120px) scale(0); opacity: 0; }
  }
</style>
</head>
<body>

<div class="scene">

  <!-- LOADING BAR -->
  <div class="bar-wrap">
    <div class="bar-track">
      <div class="bar-fill" id="barFill"></div>
      <span class="bar-label" id="barLabel">LOADING 0%</span>
    </div>
    <div class="done-msg" id="doneMsg">✓ READY!</div>
  </div>

</div>

<!-- Confetti container -->
<div class="confetti-wrap" id="confetti"></div>

<script>
  const fill    = document.getElementById('barFill');
  const label   = document.getElementById('barLabel');
  const doneMsg = document.getElementById('doneMsg');
  const confetti = document.getElementById('confetti');

  let pct = 0;
  const COLORS = ['#f0604a','#4d90e8','#2d9e4f','#f0a020','#a855f7','#ec4899'];

  function spawnDots() {
    for (let i = 0; i < 18; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.style.background = COLORS[Math.floor(Math.random() * COLORS.length)];
      dot.style.left = (20 + Math.random() * 60) + 'vw';
      dot.style.top  = (40 + Math.random() * 30) + 'vh';
      dot.style.animation = `popDot ${0.6 + Math.random() * 0.6}s ease-out ${Math.random() * 0.3}s forwards`;
      confetti.appendChild(dot);
    }
    setTimeout(() => confetti.innerHTML = '', 2000);
  }

  function step() {
    if (pct >= 100) {
      fill.style.width = '100%';
      label.textContent = 'LOADING 100%';
      fill.classList.add('done');
      setTimeout(() => {
        doneMsg.classList.add('show');
        spawnDots();
      }, 300);
      // Restart after 2s
      setTimeout(restart, 2500);
      return;
    }

    // Vary speed: slow at start/end, quick in middle
    const speed = pct < 15 ? 80
                : pct < 85 ? 35 + Math.random() * 40
                :             90 + Math.random() * 60;
    const increment = pct < 85 ? (Math.random() < 0.15 ? 0 : 1) : 1; // occasional stall

    pct = Math.min(100, pct + increment);
    fill.style.width = pct + '%';
    label.textContent = 'LOADING ' + pct + '%';
    setTimeout(step, speed);
  }

  function restart() {
    pct = 0;
    fill.style.width = '0%';
    fill.classList.remove('done');
    label.textContent = 'LOADING 0%';
    doneMsg.classList.remove('show');
    setTimeout(step, 400);
  }

  // Kick off
  setTimeout(step, 600);
</script>
</body>
</html>
