<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f5f3ee;font-family:'Segoe UI','Roboto',serif;color:#2e241f;}
#splash{position:fixed;inset:0;background:#f5f3ee;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:18px;}
#splash h1{font-size:2rem;color:#3b2f24;text-align:center;max-width:500px;}
#splash p{color:#5e4f3e;font-size:1rem;text-align:center;max-width:420px;}
.btn{background:#b68b74;color:#fff;border:none;padding:12px 32px;border-radius:30px;font-size:1.05rem;cursor:pointer;font-weight:600;letter-spacing:.3px;}
.btn:hover{background:#a07060;}
#app{display:none;max-width:860px;margin:0 auto;padding:20px 16px 60px;}
.top-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px;background:#fefcf8;padding:14px 16px;border-radius:14px;border:1px solid #ddd8ce;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.top-bar h2{font-size:1rem;color:#3b2f24;flex:1;min-width:160px;}
.top-bar input[type=number]{width:80px;padding:7px 10px;border:1px solid #c9bbae;border-radius:8px;font-size:.95rem;color:#3b2f24;background:#fefcf8;}
.top-bar select{padding:7px 10px;border:1px solid #c9bbae;border-radius:8px;font-size:.9rem;color:#3b2f24;background:#fefcf8;}
.top-bar .btn{padding:8px 20px;font-size:.9rem;}
#scoreBar{background:#e7d9cf;border-radius:10px;padding:10px 16px;margin-bottom:14px;font-size:.92rem;color:#3b2f24;display:flex;gap:20px;flex-wrap:wrap;}
#scoreBar span{font-weight:600;}
.q-card{background:#fff;border-left:5px solid #b68b74;padding:20px 22px 16px;border-radius:0 14px 14px 0;margin-bottom:18px;border:1px solid #f0eae3;border-left-width:5px;}
.q-num{display:inline-block;font-weight:700;font-size:1rem;background:#e7d9cf;padding:3px 14px 3px 10px;border-radius:0 20px 20px 0;margin-left:-22px;margin-bottom:12px;color:#3e2d1d;}
.q-text{font-size:1.05rem;line-height:1.6;margin:10px 0 14px;color:#2a211b;}
.options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
@media(max-width:500px){.options{grid-template-columns:1fr;}}
.opt-btn{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;border-radius:10px;border:1.5px solid #d4c3b6;background:#faf6f2;cursor:pointer;font-size:.98rem;color:#2a211b;text-align:left;transition:.15s;width:100%;}
.opt-btn:hover:not(:disabled){background:#f0e6dc;border-color:#b68b74;}
.opt-btn:disabled{cursor:default;}
.opt-btn .lbl{font-weight:700;color:#7a5a44;min-width:22px;}
.opt-btn.correct{background:#d4f0e2;border-color:#4caf87;color:#0d4a30;}
.opt-btn.wrong{background:#fde0e0;border-color:#e07070;color:#5a1a1a;}
.opt-btn.reveal{background:#e8f0fc;border-color:#5b8de0;color:#1a2e5a;}
.ans-row{display:flex;align-items:center;gap:10px;margin-top:6px;min-height:28px;}
.ans-badge{font-size:.85rem;padding:3px 12px;border-radius:20px;font-weight:600;}
.ans-badge.correct{background:#c8f0dd;color:#0d4a30;}
.ans-badge.wrong{background:#fde0e0;color:#5a1a1a;}
.exam-tag{display:inline-block;background:#d4c3b6;padding:4px 14px;border-radius:20px;font-size:.78rem;font-weight:600;color:#2f241b;text-transform:uppercase;letter-spacing:.3px;}
#navBar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;max-height:120px;overflow-y:auto;padding:10px;background:#fefcf8;border:1px solid #ddd8ce;border-radius:12px;}
.nav-chip{width:36px;height:28px;border-radius:8px;border:1px solid #c9bbae;background:#f5f0ea;font-size:.78rem;font-weight:600;cursor:pointer;color:#5e4f3e;transition:.1s;}
.nav-chip:hover{background:#e7d9cf;}
.nav-chip.answered-correct{background:#c8f0dd;border-color:#4caf87;color:#0d4a30;}
.nav-chip.answered-wrong{background:#fde0e0;border-color:#e07070;color:#5a1a1a;}
.nav-chip.current{outline:2px solid #b68b74;outline-offset:2px;}
.pager{display:flex;gap:10px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
.pager button{background:#fefcf8;border:1px solid #c9bbae;padding:8px 18px;border-radius:10px;cursor:pointer;color:#3b2f24;font-size:.9rem;}
.pager button:hover{background:#e7d9cf;}
#results{display:none;max-width:600px;margin:0 auto;padding:30px 20px;text-align:center;}
#results h2{font-size:1.8rem;color:#3b2f24;margin-bottom:10px;}
#results .big{font-size:3rem;font-weight:700;color:#b68b74;margin:10px 0;}
#results p{color:#5e4f3e;margin-bottom:8px;}
.progress-wrap{width:100%;height:10px;background:#e7d9cf;border-radius:10px;margin-bottom:14px;}
.progress-fill{height:100%;background:#b68b74;border-radius:10px;transition:.3s;}
</style>

<div id="app">

      <option value="wrong">Wrong Only</option>
      <option value="correct">Correct Only</option>

    <button class="btn" style="background:#5b8de0;" onclick="showResults()">Finish</button>
  </div>
  <div id="scoreBar">
    <span>Q <span id="curQNum">1</span> / <span id="totalQ">725</span></span>

    <span>❌ <span id="scoreWrong">0</span></span>
    <span>⬜ <span id="scoreLeft">725</span> left</span>
  </div>
  <div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div id="navBar"></div>
  <div id="questionArea"></div>
  <div class="pager">
    <button onclick="navigate(-1)">◀ Previous</button>
    <button onclick="navigate(1)">Next ▶</button>
  </div>
</div>

<div id="results">

  <div class="big" id="resScore">—</div>
  <p id="resSummary"></p>

</div>

// Fill remaining questions 51–725 with placeholder pattern (same as original HTML approach)
const totalNeeded = 725;
let allQ = [...questionsData];
while(allQ.length < totalNeeded){
  let idx = allQ.length % questionsData.length;
  let copy = JSON.parse(JSON.stringify(questionsData[idx]));
  copy.exam = copy.exam + " ★";
  copy.q = "[Q" + (allQ.length+1) + "] " + copy.q;
  allQ.push(copy);
}
allQ = allQ.slice(0, totalNeeded);

// ── State ──
let activeList = [];  // indices into allQ (0-based)
let currentIdx = 0;   // index in activeList
const userAnswers = {};  // qNum(1-based) -> letter chosen

function optLetter(n){ return ['a','b','c','d'][n-1]; }
function optIndex(letter){ return {a:0,b:1,c:2,d:3}[letter]; }

function startQuiz(mode){
  document.getElementById('splash').style.display='none';
  document.getElementById('app').style.display='block';
  if(mode==='random'){
    let arr = Array.from({length:725},(_,i)=>i);
    arr.sort(()=>Math.random()-.5);
    activeList = arr.slice(0,50);
    activeList.sort((a,b)=>a-b);
  } else {
    activeList = Array.from({length:725},(_,i)=>i);
  }
  document.getElementById('totalQ').textContent = activeList.length;
  buildNav();
  renderQuestion(0);
}

function buildNav(){
  const bar = document.getElementById('navBar');
  bar.innerHTML='';
  activeList.forEach((qIdx,i)=>{
    const qNum = qIdx+1;
    const btn = document.createElement('button');
    btn.className='nav-chip';
    btn.id='nav-'+i;
    btn.textContent=qNum;
    btn.onclick=()=>renderQuestion(i);
    bar.appendChild(btn);
  });
}

function renderQuestion(listIdx){
  currentIdx = listIdx;
  const qIdx = activeList[listIdx];
  const qNum = qIdx+1;
  const q = allQ[qIdx];
  const correctLetter = answerKey[qNum] || 'a';
  const userAns = userAnswers[qNum];

  document.getElementById('curQNum').textContent = qNum;

  // update nav
  document.querySelectorAll('.nav-chip').forEach(c=>c.classList.remove('current'));
  const nc = document.getElementById('nav-'+listIdx);
  if(nc){ nc.classList.add('current'); nc.scrollIntoView({block:'nearest'}); }

  const opts = [q.opt1, q.opt2, q.opt3, q.opt4];
  let html = `<div class="q-card">
    <div class="q-num">Q.${qNum}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">`;

  opts.forEach((opt,i)=>{
    const letter = optLetter(i+1);
    let cls = '';
    let disabled = userAns ? 'disabled' : '';
    if(userAns){
      if(letter === correctLetter) cls = 'correct';
      else if(letter === userAns) cls = 'wrong';
      else cls = '';
    }
    html += `<button class="opt-btn ${cls}" ${disabled} onclick="checkAnswer(${qNum},'${letter}',${listIdx})">
      <span class="lbl">(${letter})</span> ${opt}
    </button>`;
  });

  html += `</div><div class="ans-row">`;
  if(userAns){
    if(userAns === correctLetter){
      html += `<span class="ans-badge correct">✔ Correct!</span>`;
    } else {
      html += `<span class="ans-badge wrong">✘ Wrong — Answer: (${correctLetter})</span>`;
    }
  }
  html += `</div><div class="exam-tag">${q.exam}</div></div>`;

  document.getElementById('questionArea').innerHTML = html;
  updateScore();
}

function checkAnswer(qNum, letter, listIdx){
  if(userAnswers[qNum]) return;
  userAnswers[qNum] = letter;
  const correct = answerKey[qNum] || 'a';
  // update nav chip
  const nc = document.getElementById('nav-'+listIdx);
  if(nc){
    nc.classList.remove('answered-correct','answered-wrong');
    nc.classList.add(letter===correct?'answered-correct':'answered-wrong');
  }
  renderQuestion(listIdx);
}

function navigate(dir){
  const newIdx = currentIdx + dir;
  if(newIdx >= 0 && newIdx < activeList.length) renderQuestion(newIdx);
}

function jumpTo(){
  const val = parseInt(document.getElementById('jumpInput').value);
  if(!val) return;
  const listPos = activeList.indexOf(val-1);
  if(listPos !== -1) renderQuestion(listPos);
  else {
    const closest = activeList.findIndex(i=>i>=val-1);
    if(closest !== -1) renderQuestion(closest);
  }
}

function applyFilter(){
  const f = document.getElementById('filterSel').value;
  let filtered;
  if(f==='all') filtered = Array.from({length:725},(_,i)=>i);
  else if(f==='unattempted') filtered = Array.from({length:725},(_,i)=>i).filter(i=>!userAnswers[i+1]);
  else if(f==='wrong') filtered = Array.from({length:725},(_,i)=>i).filter(i=>userAnswers[i+1] && userAnswers[i+1]!==answerKey[i+1]);
  else if(f==='correct') filtered = Array.from({length:725},(_,i)=>i).filter(i=>userAnswers[i+1] && userAnswers[i+1]===answerKey[i+1]);
  
  activeList = filtered.length ? filtered : Array.from({length:725},(_,i)=>i);
  document.getElementById('totalQ').textContent = activeList.length;
  buildNav();
  renderQuestion(0);
}

function updateScore(){
  let correct = 0, wrong = 0;
  Object.keys(userAnswers).forEach(qNum=>{
    if(userAnswers[qNum] === answerKey[qNum]) correct++;
    else wrong++;
  });
  const attempted = correct + wrong;
  document.getElementById('scoreCorrect').textContent = correct;
  document.getElementById('scoreWrong').textContent = wrong;
  document.getElementById('scoreLeft').textContent = 725 - attempted;
  document.getElementById('progressFill').style.width = (attempted/725*100).toFixed(1)+'%';
}

function showResults(){
  document.getElementById('app').style.display='none';
  document.getElementById('results').style.display='block';
  let correct = 0, wrong = 0;
  Object.keys(userAnswers).forEach(qNum=>{
    if(userAnswers[qNum] === answerKey[qNum]) correct++;
    else wrong++;
  });
  const attempted = correct + wrong;
  const pct = attempted ? Math.round(correct/attempted*100) : 0;
  document.getElementById('resScore').textContent = correct + ' / ' + attempted;
  document.getElementById('resSummary').textContent =
    `Accuracy: ${pct}% · Correct: ${correct} · Wrong: ${wrong} · Unattempted: ${725-attempted}`;
}
</script>
