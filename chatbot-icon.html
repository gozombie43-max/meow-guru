<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot Icon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d0f1a;
  }

  /* ── FAB ── */
  .chatbot-fab {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c6df0 0%, #f07c6d 100%);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(124, 109, 240, 0.55);
    position: relative;
    animation: fabPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    transition: transform 0.2s;
  }

  .chatbot-fab:hover {
    transform: scale(1.1);
  }

  /* ── Pulse ring ── */
  .chatbot-fab::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c6df0 0%, #f07c6d 100%);
    opacity: 0.4;
    animation: pulse 2s ease-out infinite;
  }

  /* ── Orbit dot ── */
  .chatbot-fab::after {
    content: '';
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #fff;
    top: 2px;
    right: 4px;
    animation: orbit 3s linear infinite;
  }

  /* ── Icon ── */
  .fab-icon {
    width: 30px;
    height: 30px;
    position: relative;
    z-index: 1;
  }

  /* ── Animations ── */
  @keyframes fabPop {
    from { transform: scale(0) rotate(-30deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg);   opacity: 1; }
  }

  @keyframes pulse {
    0%   { transform: scale(1);   opacity: 0.4; }
    80%  { transform: scale(1.9); opacity: 0;   }
    100% { opacity: 0; }
  }

  @keyframes orbit {
    0%   { transform: rotate(0deg)   translateX(26px); }
    100% { transform: rotate(360deg) translateX(26px); }
  }
</style>
</head>
<body>

  <button class="chatbot-fab" title="Ask AI Tutor">
    <svg class="fab-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Chat bubble body -->
      <path
        d="M12 2C6.48 2 2 6.48 2 12C2 14.05 2.63 15.96 3.7 17.54L2.29 21.71L6.46 20.3C8.04 21.37 9.95 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2Z"
        fill="white"
        fill-opacity="0.95"
      />
      <!-- Three dots -->
      <circle cx="8.5"  cy="12" r="1.3" fill="#7c6df0"/>
      <circle cx="12"   cy="12" r="1.3" fill="#7c6df0"/>
      <circle cx="15.5" cy="12" r="1.3" fill="#7c6df0"/>
    </svg>
  </button>

</body>
</html>
